<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const CourseList = () => {
      const [courses, setCourses] = React.useState([
        { id: 1, name: "Full Stack Development", seats: 10 },
        { id: 2, name: "Artificial Intelligence", seats: 0 },
        { id: 3, name: "Cyber Security", seats: 5 }
      ]);

      const registerCourse = (courseId) => {
        setCourses(prevCourses => prevCourses.map(c => 
          c.id === courseId ? { ...c, seats: Math.max(0, c.seats - 1) } : c
        ));
        alert('Successfully registered for the course!');
      };

      return (
        <div className="row">
          {courses.map(course => (
            <div className="col-md-4 mb-3" key={course.id}>
              <div className="card p-3 border">
                <h5>{course.name}</h5>
                <p>Status: <span className={course.seats > 0 ? "text-success" : "text-danger"}>{course.seats > 0 ? "Available" : "Full"}</span></p>
                <p>Seats: {course.seats}</p>
                <button 
                  className="btn btn-primary" 
                  disabled={course.seats === 0}
                  onClick={() => registerCourse(course.id)}
                >
                  Register
                </button>
              </div>
            </div>
          ))}
        </div>
      );
    };

    const App = () => {
      return (
        <div>
          <nav className="navbar navbar-dark bg-dark">
            <div className="container-fluid">
              <span className="navbar-brand mb-0 h1">Student Dashboard | Courses | Contact</span>
            </div>
          </nav>
          <div className="container mt-4">
            <h2 className="text-center">Available Courses</h2>
            <CourseList />
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
