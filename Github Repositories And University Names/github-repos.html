<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Repositories</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #0f0f1a;
            min-height: 100vh;
            padding: 40px 20px;
            color: #ffffff;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #00d4ff;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #8892b0;
            margin-bottom: 32px;
            font-size: 14px;
        }

        .input-section {
            background: #1a1a2e;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 32px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .input-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        input[type="text"] {
            flex: 1;
            min-width: 200px;
            padding: 14px 18px;
            font-family: 'Source Code Pro', monospace;
            font-size: 16px;
            background: #16213e;
            border: 2px solid transparent;
            border-radius: 8px;
            color: #ffffff;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }

        input[type="text"]::placeholder {
            color: #8892b0;
        }

        button {
            padding: 14px 28px;
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            font-weight: 600;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #0f0f1a;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .table-container {
            background: #1a1a2e;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(135deg, #16213e, #1a1a2e);
        }

        th {
            padding: 16px;
            text-align: left;
            font-weight: 600;
            color: #00d4ff;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        td {
            padding: 16px;
            border-top: 1px solid #16213e;
            font-size: 14px;
        }

        tbody tr {
            transition: background 0.3s ease;
        }

        tbody tr:hover {
            background: rgba(0, 212, 255, 0.05);
        }

        .repo-name {
            font-weight: 600;
            color: #00d4ff;
        }

        .repo-description {
            color: #8892b0;
            max-width: 300px;
        }

        .repo-stats {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #8892b0;
            font-family: 'Source Code Pro', monospace;
            font-size: 13px;
        }

        .language-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        .repo-link {
            color: #00d4ff;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .repo-link:hover {
            color: #00ff88;
        }

        .loading, .error, .no-data {
            text-align: center;
            padding: 40px;
            color: #8892b0;
            font-size: 16px;
        }

        .error {
            color: #ff4757;
        }

        .loading::after {
            content: '';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        @media (max-width: 768px) {
            th, td {
                padding: 12px 8px;
                font-size: 13px;
            }
            
            .repo-description {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>GitHub Repositories</h1>
        <p class="subtitle">Enter a GitHub username to view all their repositories</p>
        
        <div class="input-section">
            <div class="input-group">
                <input type="text" id="username" placeholder="Enter GitHub username (e.g., torvalds)">
                <button onclick="fetchRepositories()">Get Repositories</button>
            </div>
        </div>

        <div class="table-container">
            <table id="reposTable">
                <thead>
                    <tr>
                        <th>Repository Name</th>
                        <th>Description</th>
                        <th>Language</th>
                        <th>Stars</th>
                        <th>Forks</th>
                        <th>Link</th>
                    </tr>
                </thead>
                <tbody id="reposBody">
                </tbody>
            </table>
            <div id="message"></div>
        </div>
    </div>

    <script>
        const languageColors = {
            'JavaScript': '#f7df1e',
            'Python': '#3572A5',
            'Java': '#b07219',
            'TypeScript': '#2b7489',
            'C++': '#f34b7d',
            'C': '#555555',
            'C#': '#178600',
            'Ruby': '#701516',
            'Go': '#00ADD8',
            'Rust': '#dea584',
            'PHP': '#4F5D95',
            'Swift': '#ffac45',
            'Kotlin': '#A97BFF',
            'HTML': '#e34c26',
            'CSS': '#563d7c',
            'Shell': '#89e051'
        };

        function fetchRepositories() {
            const username = document.getElementById('username').value.trim();
            const messageDiv = document.getElementById('message');
            const tbody = document.getElementById('reposBody');
            
            // Clear previous results
            tbody.innerHTML = '';
            
            if (!username) {
                messageDiv.innerHTML = '<div class="error">Please enter a GitHub username</div>';
                return;
            }

            messageDiv.innerHTML = '<div class="loading">Loading repositories</div>';

            // Using AJAX with XMLHttpRequest to get GitHub user repositories
            const xhr = new XMLHttpRequest();
            xhr.open('GET', `https://api.github.com/users/${username}/repos?sort=updated&per_page=100`, true);
            xhr.setRequestHeader('Accept', 'application/vnd.github.v3+json');
            
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        const data = JSON.parse(xhr.responseText);
                        messageDiv.innerHTML = '';
                        
                        if (data.length === 0) {
                            messageDiv.innerHTML = '<div class="no-data">No repositories found for this user</div>';
                            return;
                        }

                        data.forEach(repo => {
                            const row = document.createElement('tr');
                            const langColor = languageColors[repo.language] || '#8892b0';
                            
                            row.innerHTML = `
                                <td class="repo-name">${repo.name}</td>
                                <td class="repo-description">${repo.description || 'No description'}</td>
                                <td>
                                    <div class="repo-stats">
                                        <span class="language-dot" style="background-color: ${langColor}"></span>
                                        <span>${repo.language || 'N/A'}</span>
                                    </div>
                                </td>
                                <td class="stat">⭐ ${repo.stargazers_count}</td>
                                <td class="stat">🍴 ${repo.forks_count}</td>
                                <td><a href="${repo.html_url}" target="_blank" class="repo-link">View</a></td>
                            `;
                            tbody.appendChild(row);
                        });
                    } else if (xhr.status === 404) {
                        messageDiv.innerHTML = '<div class="error">User not found</div>';
                    } else if (xhr.status === 403) {
                        messageDiv.innerHTML = '<div class="error">API rate limit exceeded. Please try again later.</div>';
                    } else {
                        messageDiv.innerHTML = '<div class="error">Failed to fetch repositories</div>';
                    }
                }
            };
            
            xhr.send();
        }

        // Allow Enter key to trigger search
        document.getElementById('username').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                fetchRepositories();
            }
        });
    </script>
</body>
</html>
